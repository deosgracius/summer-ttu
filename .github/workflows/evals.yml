name: evals

# Gate every push / PR on the assistant's guardrail evals + deterministic tests.
# The structural eval harness needs no API key, so this runs for free on every commit
# and fails the build if a change weakens a guardrail (e.g. exposes a dangerous tool
# on the kiosk, breaks the prereq parser, or breaks retrieval fusion).

on:
  push:
  pull_request:

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db   # ephemeral DB; structural evals don't touch it
    steps:
      - uses: actions/checkout@v4

      - name: Secret-exposure guard (no API key in the client bundle or repo)
        run: bash scripts/check_secrets.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python dependency audit (pip-audit, advisory)
        # Surfaces known CVEs in the installed backend deps. Non-blocking so a deploy is
        # never held hostage to an unfixable transitive advisory; a red step = review it.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --desc

      - name: Structural eval gate (no API key needed)
        run: python -m app.eval_harness

      - name: Deterministic test suites
        # `python -m pytest` (not bare `pytest`) so the repo root is on sys.path
        # and `import app` resolves. Covers graph, vector, doc-RAG chunking, the
        # multi-agent orchestrator, the eval + red-team scorers, and the LLM-vs-
        # search-box benchmark's deterministic checks (routing, baseline accuracy,
        # scorer, aggregation) — all no-key. The live benchmark stays opt-in.
        run: python -m pytest tests/test_graph.py tests/test_vector.py tests/test_evals.py tests/test_docs_rag.py tests/test_orchestrator.py tests/test_benchmark.py tests/test_safety.py -q

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Optional: behavioral evals that actually drive the LLM. These need a real API
  # key + loaded data, so they're disabled by default. To enable: add the repo
  # secret OPENAI_API_KEY (or ANTHROPIC_API_KEY), import the campus data into the
  # CI DB, then uncomment.
  # ---------------------------------------------------------------------------
