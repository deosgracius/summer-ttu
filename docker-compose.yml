services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://summer:summer@db:5432/summer
      - SECRET_KEY=change-me-in-production
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=summer
      - POSTGRES_PASSWORD=summer
      - POSTGRES_DB=summer
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
