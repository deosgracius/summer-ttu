apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2                      # horizontally scaled; the API is stateless
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/deomwala/summer-api:latest   # built + pushed by the deploy workflow
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: summer-config
            - secretRef:
                name: summer-secrets
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api               # must be "api" — the web/nginx upstream is api:8000
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
