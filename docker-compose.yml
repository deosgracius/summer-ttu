# One-command full stack for Summer:
#   docker compose up --build
# Then open the app at http://localhost:8080  (API docs at http://localhost:8000/docs).
#
# Brings up: the FastAPI backend, the React frontend (nginx), a Postgres database
# (pgvector image, so the production vector path is available), and Neo4j for the
# prerequisite graph. The backend's graph + embedding features light up automatically
# because NEO4J_URI and the API keys are wired in below.
services:
  api:
    build: .
    env_file:
      - .env                       # brings your LLM API keys + other config
    environment:                   # these OVERRIDE .env to point at the containers
      - DATABASE_URL=postgresql+psycopg://summer:summer@db:5432/summer
      - SECRET_KEY=change-me-in-production
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changeme123
    ports:
      - "8000:8000"
    depends_on:
      - db
      - neo4j

  web:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16   # Postgres 16 + the pgvector extension
    environment:
      - POSTGRES_USER=summer
      - POSTGRES_PASSWORD=summer
      - POSTGRES_DB=summer
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/changeme123
    ports:
      - "7474:7474"                 # Neo4j Browser (http://localhost:7474)
      - "7687:7687"                 # Bolt protocol (used by the app)
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
