# Serves the built React SPA and reverse-proxies API calls to the FastAPI
# container. This mirrors the Vite dev proxy (vite.config.ts): the browser only
# ever talks to this origin, so there is no CORS and WebSockets work.

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket endpoint (realtime updates) — needs the upgrade headers.
    location /ws {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Kiosk API calls. NOTE: the bare /kiosk PAGE is a React route and must fall
    # through to the SPA below — only these two sub-paths are backend calls.
    location /kiosk/ask { proxy_pass http://api_backend; proxy_set_header Host $host; }
    location /kiosk/tts { proxy_pass http://api_backend; proxy_set_header Host $host; }

    # All other backend route prefixes (kept in sync with vite.config.ts).
    location ~ ^/(auth|agent|vision|tasks|reminders|emails|memories|events|content|admin|campus|security|voice|payments|oauth|ui|docs|openapi\.json) {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the SPA; let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
